          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
                    goalId:
                      type: string
                    description:
                      type: string
              example:
                - id: 2a2f499e-ae13-45d1-b501-aa1d25ff6a4a
                  name: Volume
                  goalId: 04bae524-6a6d-4ed8-bf40-e17260364649
                  description:
                    Volume is measured in total pounds lifted. Lifting more volume while maintaining a high level
                    of effort drives hypertrophy, or muscle growth.
                - id: 2b09a416-3950-4695-8ee0-7a26498ca11c
                  name: Work
                  goalId: 35677646-4789-4c0e-8f97-d27ce7b998f5
                  description:
                    Work, as measured in kilojoules (kJ), is calculated by multiplying the total distance traveled
                    by Tonal’s cables (in inches) by the total load lifted (in pounds) in each workout. This is an accurate
                    proxy for calorie burn.
                - id: 5b8646fd-1df0-4b19-8c5b-72f8ad816955
                  name: Movement Quality Score
                  goalId: 6e93bbb0-bc42-452a-8bd5-1221804a3e53
                  description:
                    Your Movement Quality Score reflects how much your weekly workouts improve movement patterns,
                    such as mobility exercises that engage joints through full ranges of motion.
                - id: 81f42024-999a-4878-b593-3c001d98c874
                  name: Strength Sets
                  goalId: d1eaa16e-fb4c-4d5e-8077-5ab6a35c13a6
                  description:
                    Strength Sets are performed with weights exceeding 72% of your estimated one-rep max for a particular
                    move, as lifting heavier weights increases muscular strength.
                - id: a354b978-a53c-4481-bd43-97fc40acf60b
                  name: Power Reps
                  goalId: d165ab32-17cf-4c6d-859a-e423eac0e591
                  description:
                    Power Reps are reps performed above 80% of your Power PR for a particular move. Lifting explosively
                    to develop power is a key aspect of athletic performance.
                - id: b9bb5c52-a6d4-48ed-bbc5-3a645bb89e15
                  name: Endurance Sets
                  goalId: 8fd57ada-df31-435c-b10c-60f01a3398fe
                  description:
                    Endurance Sets involve performing 9 or more reps at your suggested weight to boost stamina through
                    high-effort work.
                - id: e46f85cf-a9bc-42b4-836e-52c6621e7481
                  name: Functional Strength Score
                  goalId: cbfae767-8d3d-4e7d-b682-c46935503473
                  description:
                    Your Functional Strength Score reflects how much your weekly workouts include exercises that
                    develop functional strength, such as unilateral and rotational moves.
