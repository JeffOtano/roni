openapi: 3.0.0
info:
  title: Tonal Unofficial API
  version: 6.0.0
  description:
    "Reverse-engineered Tonal API from mitmproxy traffic captures (Mar 11 & Mar 15, 2026). All endpoints require
    Bearer token auth via Auth0 (tonal.auth0.com).


    103 endpoints across user data, workouts, programs, social, and device management.


    Auth flow: POST https://tonal.auth0.com/oauth/token with password-realm grant, client ID ERCyexW-xoVG_Yy3RDe-eV4xsOnRHP6L,
    scope openid profile email offline_access."
servers:
  - url: https://api.tonal.com
    description: Tonal Production API
  - url: https://media-api.tonal.com
    description: Tonal Media API
  - url: https://assets-cdn.tonal.com
    description: Tonal Assets CDN
  - url: https://media-cdn.tonal.com
    description: Tonal Media CDN
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Auth0 JWT token from Tonal login
security:
  - bearerAuth: []
