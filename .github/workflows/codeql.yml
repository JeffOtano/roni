name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Explain skipped CodeQL analysis
        if: ${{ vars.ENABLE_GITHUB_SECURITY_SCANS != 'true' }}
        run: |
          echo "Skipping CodeQL."
          echo "Set ENABLE_GITHUB_SECURITY_SCANS=true and enable code scanning in repository settings to run this workflow."

      - uses: actions/checkout@v6
        if: ${{ vars.ENABLE_GITHUB_SECURITY_SCANS == 'true' }}

      - name: Initialize CodeQL
        if: ${{ vars.ENABLE_GITHUB_SECURITY_SCANS == 'true' }}
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Perform CodeQL Analysis
        if: ${{ vars.ENABLE_GITHUB_SECURITY_SCANS == 'true' }}
        uses: github/codeql-action/analyze@v4
